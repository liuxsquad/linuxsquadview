<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DDoS Linux</title>

<style>
body {
    margin: 0;
    background: black;
    font-family: monospace;
    color: #00ff9f;
}

/* HEADER */
.header {
    text-align: center;
    font-size: 28px;
    padding: 15px;
    font-weight: bold;
    animation: glow 1.5s infinite alternate;
}

@keyframes glow {
    from { color: #00ff9f; }
    to { color: #ff0000; }
}

/* TERMINAL */
.container {
    padding: 15px;
}

#terminal {
    height: 70vh;
    overflow-y: auto;
    white-space: pre-line;
    margin-top: 10px;
}

/* INPUT LABEL */
.label {
    margin-top: 10px;
    font-size: 14px;
}

/* INPUT */
input {
    width: 100%;
    background: black;
    border: none;
    border-bottom: 1px solid #00ff9f;
    color: #00ff9f;
    font-size: 16px;
    outline: none;
    padding: 8px;
}

/* COLORS */
.success {
    color: #00ff9f;
}

.error {
    color: red;
}
</style>
</head>

<body>

<div class="header">DDoS Linux</div>

<div class="container">
    <div id="terminal"></div>

    <div class="label">ENTER YOUR IP / LINK:</div>
    <input id="input" autofocus />
</div>

<script>

const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

function print(text, type="success") {
    let line = document.createElement("div");
    line.className = type;
    line.textContent = text;
    terminal.appendChild(line);
    terminal.scrollTop = terminal.scrollHeight;
}

function isValidLink(text) {
    return text.includes(".");
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let value = input.value.trim();
        input.value = "";

        if (!isValidLink(value)) {
            print("[-] ERROR: INVALID TARGET", "error");
            print("[!] TRY AGAIN...", "error");
            return;
        }

        startFakeAttack(value);
    }
});

function startFakeAttack(target) {
    print("[+] TARGET LOCKED: " + target);
    print("[+] INITIALIZING BOTNET...\n");

    let count = 0;

    let interval = setInterval(() => {
        let success = Math.random() > 0.2;

        if (success) {
            print("[+] REQUEST SENT TO " + target, "success");
        } else {
            print("[-] BOTNET FAILURE...", "error");
        }

        count++;

        if (count >= 200) {
            clearInterval(interval);

            print("");
            print("[!] PROXY/BOTNET SENT!", "success");
            print("[!] PLEASE TRY AGAIN AFTER 24 HOURS", "error");
            print("[...] PREPARING NEXT BOTNET...\n", "success");
        }

    }, 100);
}

</script>

</body>
</html>
