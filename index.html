<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>System Access</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: "Courier New", monospace;
}

.container {
    text-align: center;
    padding-top: 80px;
}

h1 {
    font-size: 22px;
    letter-spacing: 2px;
}

#output {
    margin-top: 30px;
    font-size: 14px;
    white-space: pre-line;
}

.navbar {
    position: fixed;
    bottom: 0;
    width: 100%;
    display: flex;
    justify-content: space-around;
    border-top: 1px solid #00ff9f;
    padding: 10px 0;
}

.btn {
    color: #00ff9f;
    cursor: pointer;
    font-size: 18px;
}

.btn:hover {
    color: red;
}
</style>
</head>

<body>

<div class="container">
    <h1>ACCESS TERMINAL</h1>
    <div id="output"></div>
</div>

<div class="navbar">
    <div class="btn" onclick="showWatch()">⌂</div>
    <div class="btn" onclick="startLogs()">⏱</div>
</div>

<script>

const devices = [
    "iPhone X", "iPhone 11", "iPhone 12", "iPhone 13",
    "Samsung S10", "Samsung S20", "Samsung S21",
    "Xiaomi Mi 10", "Redmi Note 9", "Huawei P30",
    "OnePlus 8", "Pixel 5"
];

function showWatch() {
    document.getElementById("output").innerHTML =
        "I AM WATCHING YOU...\nI CAN SEE YOU...";
}

function startLogs() {
    let output = document.getElementById("output");
    output.innerHTML = "";

    let count = 0;

    let interval = setInterval(() => {
        let device = devices[Math.floor(Math.random() * devices.length)];
        let text = `[+] ${device} user accessed the system...`;

        output.innerHTML += text + "\n";

        count++;

        if (count >= 5) {
            clearInterval(interval);
        }
    }, 2000); // 10 saniyədə 5 nəfər
}

</script>

</body>
</html>
