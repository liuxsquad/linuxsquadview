<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terminal Access</title>

<style>
body {
    margin: 0;
    background: black;
    color: #00ff9f;
    font-family: monospace;
}

.container {
    padding: 20px;
}

#terminal {
    height: 80vh;
    overflow-y: auto;
    white-space: pre-line;
}

input {
    width: 100%;
    background: black;
    border: none;
    color: #00ff9f;
    font-size: 16px;
    outline: none;
}
</style>
</head>

<body>

<div class="container">
    <div id="terminal"></div>
    <input id="input" placeholder="ENTER IP OR LINK..." autofocus />
</div>

<script>

const terminal = document.getElementById("terminal");
const input = document.getElementById("input");

function print(text) {
    terminal.innerHTML += text + "\n";
    terminal.scrollTop = terminal.scrollHeight;
}

function isValidLink(text) {
    return text.includes(".");
}

input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
        let value = input.value.trim();
        input.value = "";

        if (!isValidLink(value)) {
            print("[-] ERROR: INVALID TARGET");
            print("[!] TRY AGAIN...\n");
            return;
        }

        startFakeAttack(value);
    }
});

function startFakeAttack(target) {
    print("[+] TARGET LOCKED: " + target);
    print("[+] INITIALIZING BOTNET...\n");

    let count = 0;

    let interval = setInterval(() => {
        let success = Math.random() > 0.2;

        if (success) {
            print("[+] REQUEST SENT TO " + target);
        } else {
            print("[-] BOTNET FAILURE...");
        }

        count++;

        if (count >= 200) { // 20 saniyə (10/saniyə)
            clearInterval(interval);

            print("\n[!] PROXY/BOTNET SENT!");
            print("[!] PLEASE TRY AGAIN AFTER 24 HOURS");
            print("[...] PREPARING NEXT BOTNET...\n");
        }

    }, 100); // saniyədə 10 dəfə
}

</script>

</body>
</html>
